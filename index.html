<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TaskFlow — Gateway</title>
<style>
  /* ===============================
     TASKFLOW GATEWAY UI
     White × Deep Blue Glass Style
  =============================== */

  @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600;800&display=swap');

  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: "Poppins", sans-serif;
  }

  body {
    height: 100vh;
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(120deg, #010f2e, #010b20, #eff1f3, #00174e);
    background-size: 400% 400%;
    animation: gradientMove 15s ease infinite;
    overflow: hidden;
    color: white;
  }

  @keyframes gradientMove {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
  }

  .gateway-container {
    text-align: center;
    backdrop-filter: blur(20px) saturate(120%);
    background: rgba(255, 255, 255, 0.08);
    border: 1px solid rgba(255, 255, 255, 0.3);
    border-radius: 20px;
    padding: 60px 100px;
    box-shadow: 0 8px 40px rgba(0, 0, 0, 0.25);
    animation: fadeIn 1.6s ease forwards;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(30px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .logo {
    font-size: 2.8em;
    font-weight: 800;
    letter-spacing: 1px;
    margin-bottom: 10px;
    color: #ffffff;
    animation: logoBreath 3s ease-in-out infinite;
  }
  .brand-logo {
  width: 80px;
  height: 80px;
  margin-bottom: 20px;
  filter: drop-shadow(0 0 12px rgba(26, 76, 255, 0.6));
  animation: logoBreath 3s ease-in-out infinite;
}


  @keyframes logoBreath {
    0%, 100% { text-shadow: 0 0 20px rgba(26, 76, 255, 0.8); }
    50% { text-shadow: 0 0 50px rgba(26, 76, 255, 1); }
  }

  .tagline {
    font-weight: 300;
    font-size: 1em;
    color: rgba(255,255,255,0.8);
    margin-bottom: 50px;
  }

  .btn-group {
    display: flex;
    justify-content: center;
    gap: 30px;
  }

  .btn {
    padding: 15px 60px;
    font-size: 1.1em;
    font-weight: 600;
    color: #fff;
    border: none;
    border-radius: 40px;
    background: rgba(255, 255, 255, 0.15);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255, 255, 255, 0.3);
    cursor: pointer;
    transition: all 0.4s ease;
    position: relative;
    overflow: hidden;
  }

  .btn::before {
    content: "";
    position: absolute;
    top: 0; left: -100%;
    width: 100%; height: 100%;
    background: linear-gradient(120deg, rgba(255,255,255,0.2), rgba(255,255,255,0));
    transition: all 0.5s ease;
  }

  .btn:hover::before {
    left: 100%;
  }

  .btn:hover {
    background: rgba(255,255,255,0.25);
    box-shadow: 0 0 30px rgba(26,76,255,0.6);
    transform: scale(1.05);
  }

  @media(max-width:768px) {
    .gateway-container {
      padding: 40px 50px;
    }
    .btn-group {
      flex-direction: column;
      gap: 20px;
    }
    .btn {
      width: 100%;
    }
  }
</style>
</head>
<body>
    <div class="gateway-container">
  <img src="./images/Screenshot_2025-09-26_091052-removebg-preview.png" alt="TaskFlow Logo" class="brand-logo">
  <div class="logo">LIFEBOARD</div>
  <p class="tagline">Where progress begins.</p>
  <div class="btn-group">
    <button class="btn" onclick="window.location.
    href='login.html'">Login</button>
    <button class="btn" onclick="window.location.href='signup.html'">Sign Up</button>
  </div>
</div>
</body>
</html>
