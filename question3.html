<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LifeBoard Onboarding - Question 3</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; font-family:"Poppins",sans-serif; }

body {
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background: linear-gradient(135deg, #000010, #000033, #001a4d);
  color:#fff;
  overflow:hidden;
}

/* ===== QUESTION CARD ===== */
.question-card {
  width:650px;
  max-width:90%;
  padding:4rem;
  border-radius:35px;
  background: rgba(10,10,35,0.25); /* glass effect */
  backdrop-filter: blur(25px);
  -webkit-backdrop-filter: blur(25px);
  box-shadow:0 25px 60px rgba(0,0,0,0.6);
  text-align:center;
  position:relative;
  transition: all 0.8s ease;
  display:flex;
  flex-direction:column;
  align-items:center;
}

.question-card.fade-out { 
  opacity:0; 
  transform: scale(0.9) translateY(-20px); 
  filter: blur(4px);
}

h1 { font-size:2.5rem; font-weight:700; margin-bottom:2rem; color:#e0e6ff; text-shadow:0 0 10px rgba(0,180,255,0.6); }

.answer-btn {
  width:100%;
  max-width:500px;
  padding:1.3rem 2rem;
  margin:0.8rem 0;
  border:none;
  border-radius:20px;
  background: rgba(255,255,255,0.05);
  color:#fff;
  font-size:1.2rem;
  font-weight:600;
  cursor:pointer;
  backdrop-filter:blur(15px);
  -webkit-backdrop-filter:blur(15px);
  box-shadow:0 10px 30px rgba(0,180,255,0.25);
  transition: all 0.3s ease;
}
.answer-btn:hover { transform:scale(1.05); box-shadow:0 15px 40px rgba(0,180,255,0.5); }
.answer-btn.selected { background: rgba(0,180,255,0.6); box-shadow:0 15px 40px rgba(0,220,255,0.8); }

.progress-container {
  width:100%;
  height:12px;
  background: rgba(255,255,255,0.08);
  border-radius:10px;
  margin-top:2.5rem;
  overflow:hidden;
}
.progress-bar {
  width:0%;
  height:100%;
  background: linear-gradient(90deg, #007bff, #00aaff);
  border-radius:10px;
  transition: width 0.7s ease;
}

.tip { font-size:0.95rem; color:#cce6ff; opacity:0.7; margin-top:1.5rem; }

/* ===== FINAL SCREEN ===== */
.final-screen {
  position: fixed;
  top:0; left:0; width:100%; height:100%;
  background: linear-gradient(135deg, #000010, #000033, #001a4d);
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  opacity:0;
  animation:fadeIn 1s forwards;
}
.final-logo {
  width:220px;
  height:220px;
  object-fit:cover;
  border-radius:25px;
  box-shadow:0 0 80px rgba(0,245,255,0.8);
  border:3px solid rgba(0,245,255,0.6);
  animation:breathe 10s ease-in-out forwards;
  margin-bottom:1.5rem;
}
.final-slogan {
  font-size:1.6rem;
  font-weight:bold;
  color:#00d1b2;
  text-shadow:0 0 20px #00d1b2;
  margin-top:1rem;
  font-family:'Courier New', monospace;
  opacity:0;
  animation:fadeInSlogan 1s forwards 1s; /* appears after 1s */
}

@keyframes breathe {
  0% { transform: scale(1); }
  50% { transform: scale(1.08); }
  100% { transform: scale(1); }
}

@keyframes fadeIn { 0%{opacity:0;} 100%{opacity:1;} }
@keyframes fadeInSlogan { 0%{opacity:0;} 100%{opacity:1;} }

@media(max-width:768px){
  .question-card{padding:3rem;
  margin-top: 40%;}
  h1{font-size:2rem;}
  .answer-btn{font-size:1rem;}
  .final-logo{width:160px;height:160px;}
  .final-slogan{font-size:1.3rem;}
}

</style>
</head>
<body>

<div class="question-card" id="questionCard">
  <h1 id="questionText">Question 3</h1>

  <button class="answer-btn">Calm & encouraging</button>
  <button class="answer-btn">Firm & direct</button>
  <button class="answer-btn">Motivational & energetic</button>
  <button class="answer-btn">Gentle reminders</button>
  <button class="answer-btn">Visual & inspiring cues</button>

  <div class="progress-container">
    <div class="progress-bar" id="progressBar"></div>
  </div>

  <div class="tip">Choose how LifeBoard motivates you</div>
</div>
<script src="login.js"></script>


</body>
</html>
